<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jestore Admin</title>
    <link rel="stylesheet" href="globals.css" />
  </head>
  <body>
    <aside class="sidebar" aria-label="Navegacion principal">
      <div class="brand">
        <span class="brand-mark">J</span>
        <div>
          <strong>Jestore</strong>
          <span>Admin</span>
        </div>
      </div>
      <nav>
        <button class="nav-item active" data-view="dashboard">Panel</button>
        <button class="nav-item" data-view="orders">Pedidos</button>
        <button class="nav-item" data-view="products">Productos</button>
        <button class="nav-item" data-view="customers">Clientes</button>
      </nav>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Operacion de tienda</p>
          <h1 id="page-title">Panel</h1>
        </div>
        <div class="actions">
          <label class="search">
            <span>Buscar</span>
            <input id="search-input" type="search" placeholder="Pedido, cliente o producto" />
          </label>
          <button id="add-order" class="primary">Nuevo pedido</button>
        </div>
      </header>

      <section class="metrics" aria-label="Resumen">
        <article>
          <span>Ventas hoy</span>
          <strong id="metric-sales">$0</strong>
          <small>Ingreso confirmado</small>
        </article>
        <article>
          <span>Pedidos activos</span>
          <strong id="metric-orders">0</strong>
          <small>En preparacion o ruta</small>
        </article>
        <article>
          <span>Inventario bajo</span>
          <strong id="metric-stock">0</strong>
          <small>Requieren reposicion</small>
        </article>
        <article>
          <span>Satisfaccion</span>
          <strong>96%</strong>
          <small>Ultimos 30 dias</small>
        </article>
      </section>

      <section class="workspace">
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 id="section-title">Pedidos recientes</h2>
              <p id="section-copy">Gestiona el flujo diario de la tienda.</p>
            </div>
            <select id="status-filter" aria-label="Filtrar por estado">
              <option value="all">Todos</option>
              <option value="Pendiente">Pendiente</option>
              <option value="Preparando">Preparando</option>
              <option value="En ruta">En ruta</option>
              <option value="Entregado">Entregado</option>
            </select>
          </div>
          <div id="content" class="content"></div>
        </div>

        <aside class="activity">
          <h2>Actividad</h2>
          <div id="activity-list"></div>
        </aside>
      </section>
    </main>

    <dialog id="order-dialog">
      <form method="dialog" id="order-form">
        <div class="dialog-head">
          <h2>Nuevo pedido</h2>
          <button value="cancel" aria-label="Cerrar">x</button>
        </div>
        <label>
          Cliente
          <input name="customer" required placeholder="Nombre del cliente" />
        </label>
        <label>
          Producto
          <input name="product" required placeholder="Producto vendido" />
        </label>
        <label>
          Total
          <input name="total" required type="number" min="1" step="1000" placeholder="85000" />
        </label>
        <menu>
          <button value="cancel">Cancelar</button>
          <button class="primary" value="default">Guardar</button>
        </menu>
      </form>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
